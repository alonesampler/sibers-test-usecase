services:
  proj_mssql:
    profiles:
      - mssql-container

  auth:
    depends_on: {}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      ConnectionStrings__DefaultConnection: Server=host.docker.internal,1433;Database=siber-auth;User Id=sa;Password=my-Se1c%ret-pw;TrustServerCertificate=True;Encrypt=True;

  project-service:
    depends_on:
      auth:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      ConnectionStrings__DefaultConnection: Server=host.docker.internal,1433;Database=siber-project;User Id=sa;Password=my-Se1c%ret-pw;TrustServerCertificate=True;Encrypt=True;