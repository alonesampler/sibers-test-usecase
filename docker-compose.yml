services:
  proj_mssql:
    # Не используй :2022-latest — при проблемах с сетью задай MSSQL_IMAGE в .env
    image: ${MSSQL_IMAGE:-mcr.microsoft.com/mssql/server:2022-CU19-ubuntu-22.04}
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "my-Se1c%ret-pw"
    volumes:
      - mssql-data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -Q \"SELECT 1\" -C -b -o /dev/null || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 90s

  auth:
    image: sibers-auth
    build:
      context: ./backend/SB.Auth
      dockerfile: SB.Auth/Dockerfile
    depends_on:
      proj_mssql:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: Server=proj_mssql,1433;Database=siber-auth;User Id=sa;Password=my-Se1c%ret-pw;TrustServerCertificate=True;Encrypt=True;
      JwtSettings__Secret: siber-company-test-case-secret-word
      JwtSettings__Issuer: SB.Auth
      JwtSettings__Audience: SB.ProjectService
      JwtSettings__ExpiresInHours: "2"
      InternalApi__ApiKey: siber-internal-sync-key
    ports:
      - "5182:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 120s
    restart: unless-stopped

  project-service:
    image: sibers-project
    build:
      context: ./backend/SB.ProjectService
      dockerfile: ProjectService/Dockerfile
    depends_on:
      proj_mssql:
        condition: service_healthy
      auth:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: Server=proj_mssql,1433;Database=siber-project;User Id=sa;Password=my-Se1c%ret-pw;TrustServerCertificate=True;Encrypt=True;
      JwtSettings__Secret: siber-company-test-case-secret-word
      JwtSettings__Issuer: SB.Auth
      JwtSettings__Audience: SB.ProjectService
      JwtSettings__ExpiresInHours: "2"
      Auth__BaseUrl: http://auth:8080
      Auth__InternalApiKey: siber-internal-sync-key
    ports:
      - "5123:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 120s
    restart: unless-stopped

  frontend:
    image: sibers-frontend
    ports:
      - "5173:80"
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      auth:
        condition: service_healthy
      project-service:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mssql-data:
    name: sibers-mssql-data